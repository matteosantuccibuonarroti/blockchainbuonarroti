<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCTO Blockchain Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>
</head>
<body class="bg-light">

<div class="container py-4">

  <div class="row justify-content-center">

    <div class="col-lg-7">

      <div class="card shadow-lg rounded-4">
        <div class="card-body p-4">

          <h2 class="text-center mb-3">Dashboard PCTO Blockchain</h2>

          <div class="alert alert-primary">
            <strong>Istituto:</strong> ITT M. Buonarroti Trento
          </div>

          <div class="mb-2">
            <label class="form-label">Nome Azienda</label>
            <input id="azienda" class="form-control" placeholder="Inserisci nome azienda">
          </div>

          <div class="mb-2">
            <label class="form-label">Tutor Azienda</label>
            <input id="tutorAzienda" class="form-control" placeholder="Nome tutor aziendale">
          </div>

          <div class="mb-2">
            <label class="form-label">Tutor Classe</label>
            <input id="tutorClasse" class="form-control" placeholder="Nome tutor scolastico">
          </div>

          <div class="mb-2">
            <label class="form-label">Ore ASL Previste</label>
            <input id="orePreviste" type="number" class="form-control" placeholder="Totale ore previste">
          </div>

          <hr>

          <div class="d-grid mb-2">
            <button class="btn btn-primary" onclick="connectWallet()">Connetti MetaMask</button>
          </div>

          <div id="wallet" class="alert alert-secondary">Wallet non connesso</div>

          <div class="mb-2">
            <label class="form-label">Aggiungi ore svolte</label>
            <input id="oreInput" type="number" class="form-control" placeholder="Ore svolte">
          </div>

          <div class="d-grid gap-2">
            <button class="btn btn-success" onclick="aggiungiOre()">Registra Ore</button>
            <button class="btn btn-dark" onclick="leggiOre()">Aggiorna Stato</button>
          </div>

          <hr>

          <h5>Riepilogo Ore</h5>

          <p><strong>Ore svolte:</strong> <span id="oreSvolte">0</span></p>
          <p><strong>Ore rimanenti:</strong> <span id="oreRimanenti">0</span></p>

        </div>
      </div>

    </div>

  </div>

</div>

<script>

const contractAddress = "INSERISCI_CONTRACT_ADDRESS";

const abi = [
  {
    "inputs": [{"internalType":"uint256","name":"_ore","type":"uint256"}],
    "name":"aggiungiOre",
    "outputs":[],
    "stateMutability":"nonpayable",
    "type":"function"
  },
  {
    "inputs":[],
    "name":"leggiOre",
    "outputs":[{"internalType":"uint256","name":"","type":"uint256"}],
    "stateMutability":"view",
    "type":"function"
  }
];

let provider, signer, contract;

async function connectWallet() {
  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();
  contract = new ethers.Contract(contractAddress, abi, signer);

  document.getElementById("wallet").innerHTML =
    "Wallet connesso: " + await signer.getAddress();
}

async function aggiungiOre() {
  const ore = document.getElementById("oreInput").value;
  const tx = await contract.aggiungiOre(ore);
  await tx.wait();
  await leggiOre();
}

async function leggiOre() {
  const svolte = await contract.leggiOre();

  document.getElementById("oreSvolte").innerText = svolte;

  const previste = parseInt(document.getElementById("orePreviste").value || 0);

  const rimanenti = previste - svolte;

  document.getElementById("oreRimanenti").innerText = rimanenti >= 0 ? rimanenti : 0;
}

</script>

</body>
</html>
